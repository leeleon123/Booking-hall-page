<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Page</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Event Booking</h1>
    </header>
    <main>
        <section id="halls">
            <h2>Select Halls</h2>
            <div class="grid">
                <div class="item">
                    <img src="grand.jpg" alt="Hall 1">
                    <h3>Grand Hall</h3>
                    <p>LKR 50,000</p>
                    <button class="select-btn" data-type="hall" data-name="Grand Hall" data-price="50000">Select</button>
                </div>
                <div class="item">
                    <img src="conference.jpg" alt="Hall 2">
                    <h3>Conference Room</h3>
                    <p>LKR 30,000</p>
                    <button class="select-btn" data-type="hall" data-name="Conference Room" data-price="30000">Select</button>
                </div>
                <div class="item">
                    <img src="out.jpg" alt="Hall 3">
                    <h3>Outdoor Pavilion</h3>
                    <p>LKR 40,000</p>
                    <button class="select-btn" data-type="hall" data-name="Outdoor Pavilion" data-price="40000">Select</button>
                </div>
            </div>
        </section>
        <section id="food">
            <h2>Select Food</h2>
            <div class="grid">
                <div class="item">
                    <img src="buff.jpg" alt="Food 1">
                    <h3>Buffet</h3>
                    <p>LKR 2,000 per person</p>
                    <button class="select-btn" data-type="food" data-name="Buffet" data-price="2000">Select</button>
                </div>
                <div class="item">
                    <img src="sit.jpg" alt="Food 2">
                    <h3>Sit-down Dinner</h3>
                    <p>LKR 5,000 per person</p>
                    <button class="select-btn" data-type="food" data-name="Sit-down Dinner" data-price="5000">Select</button>
                </div>
                <div class="item">
                    <img src="tail.jpg" alt="Food 3">
                    <h3>Cocktail Party</h3>
                    <p>LKR 3,000 per person</p>
                    <button class="select-btn" data-type="food" data-name="Cocktail Party" data-price="3000">Select</button>
                </div>
            </div>
        </section>
        <section id="people">
            <h2>Number of People</h2>
            <input type="number" id="num-people" min="1" value="1">
        </section>
        <section id="checkout">
            <button id="checkout-btn">Checkout</button>
        </section>
    </main>
    <footer>
        <p>&copy; 2023 Event Booking Service</p>
    </footer>
    <div id="modal-overlay" class="modal-overlay" style="display: none;">
        <div id="summary" class="modal">
            <h3>Booking Summary</h3>
            <p id="selected-halls"></p>
            <p id="selected-food"></p>
            <p id="total-people"></p>
            <p id="total-cost"></p>
            <button id="close-modal">Close</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
